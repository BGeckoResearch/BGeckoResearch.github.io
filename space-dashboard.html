
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Space Dashboard</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      font-family: sans-serif;
    }
    #toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 8px;
      color: white;
    }
    input[type="text"] {
      padding: 6px;
      border-radius: 4px;
      border: none;
      width: 140px;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="toolbar">
    <label for="norad">Search NORAD ID:</label>
    <input list="satelliteList" id="satelliteSearch" placeholder="Search satellite name or NORAD ID" />
    <datalist id="satelliteList"></datalist>
    <button onclick="trackSatellite()">Track</button>
  </div>
  
  <script type="module">
    import * as satellite from "https://esm.sh/satellite.js@5.0.0";
    
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiYTAwZjcxOS0xZDY0LTRiNGUtOWU3OC01N2VlMzRmMTkyMWYiLCJpZCI6NDExNzM0LCJpYXQiOjE3NzQ5NDY3NzB9.d5omcPtppgFZlahZChqh1I6xWeReTJP81NQt1TMC5Qk";
    
    const viewer = new Cesium.Viewer("cesiumContainer", {
      shouldAnimate: true,
      timeline: true,
      animation: true,
      baseLayerPicker: false,
    });
    
    let currentEntity = null;
    
    async function fetchTLE(noradId) {
      const url = `https://celestrak.org/NORAD/elements/gp.php?CATNR=${encodeURIComponent(noradId)}&FORMAT=2LE`;
      console.log("Fetching TLE from:", url);
      
      const res = await fetch(url);
      console.log("CelesTrak status:", res.status);
      
      if (!res.ok) {
        throw new Error(`CelesTrak HTTP ${res.status}`);
      }
      
      const text = await res.text();
      console.log("Raw TLE response:", text);
      
      const lines = text.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
      
      if (lines.length < 2) {
        throw new Error("TLE response had fewer than 2 lines.");
      }
      
      return [lines[0], lines[1]];
    }
    
    async function trackSatellite() {
      const noradId = document.getElementById("norad").value.trim();
      console.log("Track clicked. NORAD ID =", noradId);
      
      if (!noradId) {
        alert("Enter a NORAD ID.");
        return;
      }
      
      try {
        const [tle1, tle2] = await fetchTLE(noradId);
        console.log("TLE line 1:", tle1);
        console.log("TLE line 2:", tle2);
        
        const satrec = satellite.twoline2satrec(tle1, tle2);
        console.log("satrec:", satrec);
        
        const now = new Date();
        const pv = satellite.propagate(satrec, now);
        console.log("propagate output:", pv);
        
        if (!pv.position) {
          throw new Error("Propagation returned no position.");
        }
        
        if (currentEntity) {
          viewer.entities.remove(currentEntity);
        }
        
        currentEntity = viewer.entities.add({
          name: "Satellite " + noradId,
          position: new Cesium.CallbackProperty(function(time) {
            const jsDate = Cesium.JulianDate.toDate(time);
            const pv = satellite.propagate(satrec, jsDate);
            
            if (!pv.position) return undefined;
            const gmst = satellite.gstime(jsDate);
            const geo = satellite.eciToGeodetic(pv.position, gmst);
            
            return Cesium.Cartesian3.fromDegrees(
              Cesium.Math.toDegrees(geo.longitude),
              Cesium.Math.toDegrees(geo.latitude),
              geo.height * 1000
            );
          }, false),
          
          point: {
            pixelSize: 12,
            color: Cesium.Color.CYAN
          }
        });
        
        viewer.trackedEntity = currentEntity;
        viewer.zoomTo(currentEntity);
        
        console.log("Satellite entity added successfully.");
        alert("Satellite loaded.");
      } catch (err) {
        console.error("TRACK ERROR:", err);
        alert("Could not load satellite: " + err.message);
      }
    }
    
    window.trackSatellite = trackSatellite;
  </script>
</body>
</html>
