
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Space Dashboard</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer {
      width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
      font-family: sans-serif;
    }
    #toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 5;
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 8px;
      color: white;
    }
    input[type="text"] {
      padding: 6px;
      border-radius: 4px;
      border: none;
      width: 140px;
    }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="toolbar">
    <label for="norad">Search NORAD ID:</label>
    <input list="satelliteList" id="satelliteSearch" placeholder="Search satellite name or NORAD ID" />
    <datalist id="satelliteList"></datalist>
    <button onclick="trackSatellite()">Track</button>
  </div>

  <script src="https://unpkg.com/satellite.js@5.0.1/dist/satellite.min.js"></script>

  
  <script>
    // OPTIONAL:
    // If you have a Cesium ion token, paste it here:
    Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiYTAwZjcxOS0xZDY0LTRiNGUtOWU3OC01N2VlMzRmMTkyMWYiLCJpZCI6NDExNzM0LCJpYXQiOjE3NzQ5NDY3NzB9.d5omcPtppgFZlahZChqh1I6xWeReTJP81NQt1TMC5Qk";
    const viewer = new Cesium.Viewer("cesiumContainer", {
      shouldAnimate: true,
      timeline: true,
      animation: true,
      baseLayerPicker: false,
    });
    let currentEntity = null;
    async function fetchTLE(noradId) {
      const url = `https://celestrak.org/NORAD/elements/gp.php?CATNR=${encodeURIComponent(noradId)}&FORMAT=2LE`;
      const res = await fetch(url);
      
      if (!res.ok) {
        throw new Error(`CelesTrak HTTP ${res.status}`);
      }
      
      const text = await res.text();
      const lines = text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);
      
      if (lines.length < 2 || !lines[0].startsWith("1 ") || !lines[1].startsWith("2 ")) {
        throw new Error("Valid 2-line element set not found.");
      }
      
      return [lines[0], lines[1]];
    }
    
    const satelliteCatalog = [
      { name: "ISS (ZARYA)", norad: "25544" },
      { name: "HUBBLE SPACE TELESCOPE", norad: "20580" },
      { name: "NOAA 15", norad: "25338" },
      { name: "TERRA", norad: "25994" },
      { name: "AQUA", norad: "27424" },
      { name: "LANDSAT 8", norad: "39084" },
      { name: "STARLINK-1008", norad: "44714" }
    ];
    
    function populateSatelliteList() {
      const datalist = document.getElementById("satelliteList");
      datalist.innerHTML = "";
      
      satelliteCatalog.forEach(sat => {
        const option = document.createElement("option");
        option.value = `${sat.name} (${sat.norad})`;
        datalist.appendChild(option);
      });
    }
    
    populateSatelliteList();
    
    async function trackSatellite() {
      const raw = document.getElementById("satelliteSearch").value.trim();
      const match = raw.match(/\((\d+)\)$/) || raw.match(/^(\d+)$/);
      const noradId = match ? match[1] : "";
      
      if (!noradId) {
        alert("Enter a NORAD ID.");
        return;
      }
      
      try {
        const [tle1, tle2] = await fetchTLE(noradId);
        const satrec = satellite.twoline2satrec(tle1, tle2);
        
        if (currentEntity) {
          viewer.entities.remove(currentEntity);
        }
        currentEntity = viewer.entities.add({
          name: "Satellite " + noradId,
          position: new Cesium.CallbackProperty(function (time) {
            const jsDate = Cesium.JulianDate.toDate(time);
            const pv = satellite.propagate(satrec, jsDate);
            const eci = pv.position;
            
            if (!eci) {
              
              return undefined;
            }
            
            const gmst = satellite.gstime(jsDate);
            const geo = satellite.eciToGeodetic(eci, gmst);
            const lat = Cesium.Math.toDegrees(geo.latitude);
            const lon = Cesium.Math.toDegrees(geo.longitude);
            const alt = geo.height * 1000;
            
            return Cesium.Cartesian3.fromDegrees(lon, lat, alt);
          }, false),
          point: {
            pixelSize: 10,
            color: Cesium.Color.CYAN
          },
          
          description: `NORAD ID: ${noradId}<br/>TLE:<br/>${tle1}<br/>${tle2}`
        });
        
        viewer.trackedEntity = currentEntity;
      } catch (err) {
        console.error(err);
        alert("Could not load satellite: " + err.message);
      }
    }
  </script>
</body>
</html>
