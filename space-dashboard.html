<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Space Dashboard</title>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.112/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
    #toolbar { position: absolute; top: 10px; left: 10px; z-index: 5; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; color: white; }
    input { padding: 8px; border-radius: 4px; border: 1px solid #444; width: 180px; background: #222; color: white; }
    button { padding: 8px 12px; cursor: pointer; background: #0078d4; color: white; border: none; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="toolbar">
    <label>NORAD ID:</label>
    <!-- FIXED ID HERE -->
    <input type="text" id="norad" placeholder="e.g. 25544 for ISS" /> 
    <button onclick="trackSatellite()">Track</button>
  </div>
  
  <script type="module">
    import * as satellite from "https://esm.sh/satellite.js@5.0.0";
    
    // Replace with your actual token
    Cesium.Ion.defaultAccessToken = "YOUR_ACTUAL_TOKEN_HERE";
    
    const viewer = new Cesium.Viewer("cesiumContainer", {
      shouldAnimate: true,
      baseLayerPicker: false,
    });
    
    let currentEntity = null;
    
    async function fetchTLE(noradId) {
      // Using a CORS proxy to bypass CelesTrak restrictions
      const proxy = "https://corsproxy.io?";
      const target = `https://celestrak.org/NORAD/elements/gp.php?CATNR=${noradId}&FORMAT=2LE`;
      
      const res = await fetch(proxy + encodeURIComponent(target));
      if (!res.ok) throw new Error("Could not reach CelesTrak");
      
      const text = await res.text();
      const lines = text.split(/\r?\n/).filter(line => line.trim().length > 0);
      
      if (lines.length < 2) throw new Error("Invalid TLE data found.");
      
      // If 3 lines (Name, TLE1, TLE2), take the last two
      return lines.length === 3 ? [lines[1], lines[2]] : [lines[0], lines[1]];
    }
    
    async function trackSatellite() {
      const noradId = document.getElementById("norad").value.trim();
      if (!noradId) return alert("Enter a NORAD ID");
      
      try {
        const [tle1, tle2] = await fetchTLE(noradId);
        const satrec = satellite.twoline2satrec(tle1, tle2);
        
        if (currentEntity) viewer.entities.remove(currentEntity);
        
        currentEntity = viewer.entities.add({
          name: "Satellite " + noradId,
          position: new Cesium.CallbackProperty((time) => {
            const date = Cesium.JulianDate.toDate(time);
            const positionAndVelocity = satellite.propagate(satrec, date);
            const gmst = satellite.gstime(date);
            
            if (!positionAndVelocity.position) return undefined;
            
            const positionGd = satellite.eciToGeodetic(positionAndVelocity.position, gmst);
            return Cesium.Cartesian3.fromRadians(
              positionGd.longitude, 
              positionGd.latitude, 
              positionGd.height * 1000 // Convert km to meters
            );
          }, false),
          point: { pixelSize: 10, color: Cesium.Color.CYAN },
          label: { text: noradId, font: '12pt sans-serif', pixelOffset: new Cesium.Cartesian2(0, -20) }
        });
        
        viewer.trackedEntity = currentEntity;
      } catch (err) {
        alert("Error: " + err.message);
      }
    }
    
    window.trackSatellite = trackSatellite;
  </script>
</body>
</html>
